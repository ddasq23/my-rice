# Snappy — short durations, barely any overshoot. For low-latency feel.
animations {
    enabled = true

    bezier = quick, 0.2, 0.9, 0.2, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 3, quick, slide
    animation = windowsIn, 1, 3, quick, slide
    animation = windowsOut, 1, 2, quick, slide
    animation = windowsMove, 1, 2, quick, slide
    animation = border, 1, 6, liner
    animation = borderangle, 1, 15, liner, loop
    animation = fade, 1, 3, quick
    animation = fadeIn, 1, 3, quick
    animation = fadeOut, 1, 2, quick
    animation = fadeSwitch, 1, 3, quick
    animation = fadeShadow, 1, 3, quick
    animation = fadeDim, 1, 3, quick
    animation = workspaces, 1, 3, quick, slide
    animation = specialWorkspace, 1, 3, quick, slidevert
}
