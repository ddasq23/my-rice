# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#  Hyprland Rice — Catppuccin Mocha
#  Place at ~/.config/hypr/hyprland.conf
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ---- Monitor ----
monitor=,preferred,auto,1

# ---- Theme colors (swapped by scripts/theme-switch.sh) ----
source = ~/.config/hypr/colors.conf

# ---- User settings — gaps/border/blur/opacity/layout (swapped by the
#      Control Center, Super+I). Do not hand-edit values here; they get
#      overwritten. Add new tunables at the bottom if you extend the UI. ----
source = ~/.config/hypr/user-settings.conf

# ---- Animation profile (swapped by Control Center: Snappy/Smooth/Off) ----
source = ~/.config/hypr/animations-active.conf

# ---- Autostart ----
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = eww daemon
exec-once = wl-paste --watch cliphist store
exec-once = hyprctl setcursor Catppuccin-Mocha-Dark-Cursors 24

# ---- Env vars ----
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Catppuccin-Mocha-Dark-Cursors
env = QT_QPA_PLATFORMTHEME,qt5ct

# ---- Programs ----
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun
$browser = firefox

# ---- Input ----
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# ---- General (colors from colors.conf, tunables from user-settings.conf —
#      edit live via the Control Center, Super+I) ----
general {
    gaps_in = $gapsIn
    gaps_out = $gapsOut
    border_size = $borderSize
    col.active_border = $borderActive1 $borderActive2 45deg
    col.inactive_border = $borderInactive
    resize_on_border = true
    layout = $layout
    allow_tearing = false
}

decoration {
    rounding = $rounding

    blur {
        enabled = $blurEnabled
        size = $blurSize
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1e1e2eee)
    }

    active_opacity = $activeOpacity
    inactive_opacity = $inactiveOpacity
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

gestures {
    workspace_swipe = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ---- Keybinds ----
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, $browser
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Focus movement
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media / volume / brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy

# Sidebar (eww) + terminal clock
bind = $mainMod, A, exec, ~/.config/eww/scripts/sidebar_toggle.sh
bind = $mainMod, C, exec, ~/.config/scripts/term-clock.sh
bind = $mainMod, T, exec, ~/.config/scripts/theme-picker.sh
bind = $mainMod SHIFT, U, exec, kitty --hold -e ~/.config/scripts/ota-update.sh
bind = $mainMod, I, exec, ~/.config/eww/scripts/control_toggle.sh

# ---- Window rules ----
windowrulev2 = float,class:^(clock-term)$
windowrulev2 = size 420 260,class:^(clock-term)$
windowrulev2 = move 40 60,class:^(clock-term)$
windowrulev2 = noborder,class:^(clock-term)$
windowrulev2 = opacity 0.85 0.85,class:^(clock-term)$
