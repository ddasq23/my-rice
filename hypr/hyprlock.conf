# ~/.config/hypr/hyprlock.conf

background {
    monitor =
    path = ~/.config/wallpapers/catppuccin-mocha.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.35
    outer_color = rgba(cba6f7ee)
    inner_color = rgba(1e1e2eee)
    font_color = rgba(cdd6f4ee)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(cdd6f4ee)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(cdd6f4ee)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
