# Smooth — layered bezier curves, gentle overshoot. Default profile.
animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 12, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 6, smoothIn
    animation = fadeIn, 1, 6, smoothIn
    animation = fadeOut, 1, 5, smoothOut
    animation = fadeSwitch, 1, 6, smoothIn
    animation = fadeShadow, 1, 6, smoothIn
    animation = fadeDim, 1, 6, smoothIn
    animation = workspaces, 1, 7, overshot, slide
    animation = specialWorkspace, 1, 6, overshot, slidevert
}
