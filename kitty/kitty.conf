# ~/.config/kitty/kitty.conf

font_family      JetBrainsMono Nerd Font
font_size        12.0

background_opacity 0.90
window_padding_width 10

confirm_os_window_close 0

wayland_titlebar_color system

# Theme colors — swapped by scripts/theme-switch.sh (edit theme.conf via a
# theme, not directly; re-open kitty or `kitty @ load-config` to apply)
include theme.conf
